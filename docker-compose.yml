version: '3.8'

services:
  youtube-agent:
    build:
      context: ./agents/youtube_agent
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_ENV=true
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  recipe-extractor:
    build:
      context: ./agents/recipe_agent
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes: []
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_ENV=true
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  notion-agent:
    build:
      context: ./agents/notion_agent
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_ENV=true
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_ENV=true
      - YOUTUBE_AGENT_URL=http://youtube-agent:5000
      - RECIPE_AGENT_URL=http://recipe-extractor:5001
      - NOTION_AGENT_URL=http://notion-agent:5002
    networks:
      - a2a-network
    depends_on:
      youtube-agent:
        condition: service_healthy
      recipe-extractor:
        condition: service_healthy
      notion-agent:
        condition: service_healthy

# Recipe Cliperの共有ネットワーク定義
networks:
  a2a-network:
    driver: bridge 

volumes: {}